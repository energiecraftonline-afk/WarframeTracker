# Déploiement du Worker via Wrangler.
#   wrangler deploy
#
# Le secret REGISTER_TOKEN n'est PAS ici (c'est un secret) :
#   wrangler secret put REGISTER_TOKEN --name noisy-wildflower-5226

name = "noisy-wildflower-5226"
main = "cloudflare-worker.js"
compatibility_date = "2024-11-01"

# Cache proxy partagé (réponses API). Soumis au quota d'écriture KV gratuit.
[[kv_namespaces]]
binding = "WF_CACHE"
id = "fe9e413feac34bcab702bb756eccfe7c"

# Annuaire de l'URL du PC (tunnel). D1 = 100 000 écritures/jour (pas le quota KV).
[[d1_databases]]
binding = "REGISTRY"
database_name = "wf-registry"
database_id = "3e69513f-f3b1-450d-a0a5-0eaaca58ff52"
